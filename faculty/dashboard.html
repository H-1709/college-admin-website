<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="/assets/js/auth/session.js"></script>
    <title>Faculty Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/faculty.css" />

  <style>
    .chart-card { height: 320px; }
    .chart-card canvas { height: 240px !important; }

    .course-actions .btn {
      border-radius: 10px;
      font-weight: 500;
      padding: 8px 14px;
      font-size: 14px;
    }

    .btn-soft {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
    }

    .btn-soft:hover { background: #e5e7eb; }
  </style>
</head>
<body>
  <div id="sidebarContainer"></div>

  <div class="main-content">
    <div id="headerContainer"></div>

    <main class="container-fluid py-4">
      <h2 class="fw-bold">Welcome back Sir!</h2>
      <p class="text-muted">Here's your teaching overview for today</p>

      <div id="facultyStatsRow" class="row g-4 mt-3"></div>

      <div class="row g-4 mt-4">
        <div class="col-lg-8">
          <div class="card chart-card p-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="fw-bold mb-0">Weekly Classes Overview</h5>
              <small class="text-muted">Last 7 days</small>
            </div>
            <canvas id="weeklyClassesChart"></canvas>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card chart-card p-3">
            <h5 class="fw-bold mb-2">Course Distribution</h5>
            <canvas id="courseDistributionChart"></canvas>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mt-5">
        <h4 class="fw-bold">My Courses</h4>
        <button class="btn btn-primary">+ Add Material</button>
      </div>

      <div id="facultyCoursesRow" class="row g-4 mt-2"></div>
    </main>

    <div id="footerContainer"></div>
  </div>

  <script src="/utils/helpers.js"></script>
  <script src="/assets/js/faculty.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      bootstrapFacultyDashboard();
    });
  </script>
</body>
</html>
