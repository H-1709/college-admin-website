<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Faculty Planner</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">


  <!-- Your CSS -->
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/faculty.css">
</head>

<body>

  <div id="sidebarContainer"></div>

  <main class="main-content">

    <div id="headerContainer"></div>

    <div class="container-fluid py-4">

      <!-- Page Header -->
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
          <h2 class="fw-bold mb-1">My Planner</h2>
          <p class="text-muted mb-0">Manage your weekly teaching plan</p>
        </div>

        <button class="btn btn-primary">
          + Add Task
        </button>
      </div>
      <div class="btn-group mb-4">
<button class="btn btn-primary">Week</button>
<button class="btn btn-outline-secondary">Month</button>
</div>

<span class="task"><i class="bi bi-grip-vertical"></i> ML Lab — 2:00 PM</span>

      <!-- Planner Cards -->
      <div class="planner-grid">
<div class="planner-day">
<h6>Monday</h6>
<span class="task">DSA Lecture - 9:00 AM</span>
<span class="task">ML Lab - 2:00 PM</span>
</div>

<div class="planner-day">
<h6>Tuesday</h6>
<span class="task">Web Dev Lecture - 11:00 AM</span>
</div>

<div class="planner-day">
<h6>Wednesday</h6>
</div>

<div class="planner-day">
<h6>Thursday</h6>
</div>

<div class="planner-day">
<h6>Friday</h6>
</div>

<div class="planner-day">
<h6>Saturday</h6>
</div>

<div class="planner-day">
<h6>Sunday</h6>
</div>

        

      </div>

    </div>

    <div id="footerContainer"></div>

  </main>

  <script src="../../assets/js/faculty.js"></script>
  <script>
    initLayout("../../");
  </script>

</body>
</html>
