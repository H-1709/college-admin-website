<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faculty Attendance</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">


  <!-- Global CSS -->
  <link rel="stylesheet" href="../../assets/css/base.css" />
  <link rel="stylesheet" href="../../assets/css/layout.css" />
  <link rel="stylesheet" href="../../assets/css/faculty.css" />

  <style>
    /* ===== PRO TOUCHES ===== */

    .status-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 600;
    }

    .status-present { background:#e7f7ee; color:#198754; }
    .status-absent  { background:#fde8e8; color:#dc3545; }
    .status-late    { background:#fff3cd; color:#b58105; }

    .sticky-head thead th {
      position: sticky;
      top: 0;
      background: #f8f9fa;
      z-index: 2;
    }

    .bulk-bar {
      background: #f8fafc;
      border: 1px dashed #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div id="sidebarContainer"></div>

  <div class="main-content">

    <!-- Header -->
    <div id="headerContainer"></div>

    <main class="container-fluid py-4">

      <!-- ===== PAGE HEADER ===== -->
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
          <h2 class="fw-bold mb-1">Attendance Management</h2>
          <p class="text-muted mb-0">Mark and track student attendance</p>
        </div>

        <div class="d-flex gap-2">
          <span class="badge bg-success-subtle text-success px-3 py-2">
            Present: <strong id="presentCount">0</strong>
          </span>
          <button class="btn btn-primary">📥 Export</button>
        </div>
      </div>

      <!-- ===== FILTERS ===== -->
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-3">

            <div class="col-md-4">
              <label class="form-label fw-semibold">Course</label>
              <select class="form-select">
                <option>Data Structures</option>
                <option>Machine Learning</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label fw-semibold">Date</label>
              <input type="date" class="form-control" />
            </div>

            <div class="col-md-4 d-flex align-items-end">
              <button class="btn btn-primary w-100">Load Students</button>
            </div>

          </div>
        </div>
      </div>

      <!-- ===== BULK ACTION BAR ===== -->
      <div class="bulk-bar d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div class="fw-semibold">Bulk Actions:</div>
        <div class="d-flex gap-2">
          <button class="btn btn-success btn-sm" onclick="bulkSet('Present')">Mark All Present</button>
          <button class="btn btn-danger btn-sm" onclick="bulkSet('Absent')">Mark All Absent</button>
          <button class="btn btn-warning btn-sm" onclick="bulkSet('Late')">Mark All Late</button>
        </div>
      </div>

      <!-- ===== TABLE ===== -->
      <div class="card border-0 shadow-sm">
        <div class="card-body p-0">

          <div class="table-responsive" style="max-height: 420px;">
            <table class="table table-hover align-middle mb-0 sticky-head">
              <thead class="table-light">
                <tr>
                  <th width="50">
                    <input type="checkbox" id="selectAll">
                  </th>
                  <th>#</th>
                  <th>Student Name</th>
                  <th>Enrollment</th>
                  <th width="180">Status</th>
                </tr>
              </thead>

              <tbody id="attendanceBody">

                <!-- ROW -->
                <tr>
                  <td><input type="checkbox" class="row-check"></td>
                  <td>1</td>
                  <td class="fw-semibold">Aarav Patel</td>
                  <td>CS301-001</td>
                  <td>
                    <select class="form-select form-select-sm status-select">
                      <option>Present</option>
                      <option>Absent</option>
                      <option>Late</option>
                    </select>
                  </td>
                </tr>

                <tr>
                  <td><input type="checkbox" class="row-check"></td>
                  <td>2</td>
                  <td class="fw-semibold">Riya Shah</td>
                  <td>CS301-002</td>
                  <td>
                    <select class="form-select form-select-sm status-select">
                      <option>Present</option>
                      <option>Absent</option>
                      <option>Late</option>
                    </select>
                  </td>
                </tr>

              </tbody>
            </table>
          </div>

          <div class="p-3 text-end border-top">
            <button class="btn btn-primary">💾 Save Attendance</button>
          </div>

        </div>
      </div>

    </main>

    <div id="footerContainer"></div>
  </div>

  <!-- ===== COMPONENT LOADER ===== -->
  <script>
async function loadComponent(id, file) {
  try {
    const res = await fetch(file);
    const html = await res.text();
    document.getElementById(id).innerHTML = html;

    // 🔹 highlight active sidebar link AFTER sidebar loads
    if (id === "sidebarContainer") {

      const currentPage = window.location.pathname.split("/").pop();
      const links = document.querySelectorAll(".sidebar-nav a");

      links.forEach(link => {

        const linkPage = link.getAttribute("href").split("/").pop();

        if (currentPage === linkPage) {
          link.classList.add("active");
        }

      });

    }

  } catch (e) {
    console.error("Component load error:", file);
  }
}

loadComponent('sidebarContainer','../../layouts/sidebar-faculty.html');
loadComponent('headerContainer','../../layouts/header.html');
loadComponent('footerContainer','../../layouts/footer.html');


/* ✅ HAMBURGER SIDEBAR TOGGLE */

    document.addEventListener("click", function(e) {

  const sidebar = document.querySelector("#sidebar");

  if (!sidebar) return;

  /* MOBILE MENU */
  if (e.target.closest("#menuToggle")) {
    sidebar.classList.toggle("show");
  }

  /* COLLAPSE SIDEBAR */
  if (e.target.closest("#collapseSidebarBtn")) {
    sidebar.classList.toggle("collapsed");
    document.body.classList.toggle("sidebar-collapsed");
  }

});

    // ===== SELECT ALL =====
    document.addEventListener('change', e => {
      if (e.target.id === 'selectAll') {
        document.querySelectorAll('.row-check')
          .forEach(cb => cb.checked = e.target.checked);
      }
    });

    // ===== BULK SET =====
    function bulkSet(value) {
      document.querySelectorAll('.status-select')
        .forEach(sel => sel.value = value);
      updateCount();
    }

    // ===== LIVE COUNT =====
    function updateCount() {
      const count = [...document.querySelectorAll('.status-select')]
        .filter(s => s.value === 'Present').length;
      document.getElementById('presentCount').textContent = count;
    }

    document.addEventListener('change', e => {
      if (e.target.classList.contains('status-select')) {
        updateCount();
      }
    });

    // initial count
    setTimeout(updateCount, 300);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
