<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Faculty Resources</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Global CSS -->
    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <link rel="stylesheet" href="../../assets/css/faculty.css" />
  </head>

  <body>
    <!-- ================= SIDEBAR ================= -->
    <div id="sidebarContainer"></div>

    <!-- ================= MAIN CONTENT ================= -->
    <div class="main-content">
      <!-- Header -->
      <div id="headerContainer"></div>

      <!-- ================= PAGE BODY ================= -->
      <main class="container-fluid py-4">
        <!-- Header -->
        <div
          class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4"
        >
          <div>
            <h2 class="fw-bold mb-1">Learning Resources</h2>
            <p class="text-muted mb-0">Manage and share study materials</p>
          </div>

          <!-- permission-aware -->
          <button id="uploadBtn" class="btn btn-primary">
           <i class="bi bi-cloud-upload"></i>  Upload Resource
          </button>
        </div>

        <!-- Resource Grid -->
        <div class="row g-4">
          <!-- Resource Card -->
          <div class="col-lg-4 col-md-6">
            <div class="card border-0 shadow-sm h-100">
              <div class="card-body d-flex flex-column">
                <h6 class="fw-bold mb-1 d-flex align-items-center gap-2">
                  
                  <span class="resource-name">DSA Unit 1 Notes</span>
                </h6>

                <div class="mb-2">
                  <span class="badge bg-danger-subtle text-danger">PDF</span>
                  <span class="text-muted small ms-2">Uploaded 2 days ago</span>
                </div>

                <div class="text-muted small mb-3">
                  <i class="bi bi-person"></i> Uploaded by
                  <strong>Prof. Gaurang</strong>
                  <span class="mx-2">•</span>
                  <i class="bi bi-hdd"></i> 2.4 MB
                </div>

                <div class="d-flex gap-2 mt-auto">
                  <button class="btn btn-outline-secondary btn-sm w-100">
                    <i class="bi bi-eye"></i> View
                  </button>
                  <button class="btn btn-primary btn-sm w-100">
                    <i class="bi bi-download"></i> Download
                  </button>
                  <!-- ownership-based delete -->
                  <button class="btn btn-outline-danger btn-sm delete-btn">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Resource Card -->
          <div class="col-lg-4 col-md-6">
            <div class="card border-0 shadow-sm h-100">
              <div class="card-body d-flex flex-column">
                <h6 class="fw-bold mb-1">Machine Learning Slides</h6>

                <div class="mb-2">
                  <span class="badge bg-warning-subtle text-warning">PPT</span>
                  <span class="text-muted small ms-2">Uploaded 5 days ago</span>
                </div>

                <div class="text-muted small mb-3">
                  <i class="bi bi-person"></i> Uploaded by
                  <strong>Prof. Gaurang</strong>
                  <span class="mx-2">•</span>
                  <i class="bi bi-hdd"></i> 5.8 MB
                </div>

                <div class="d-flex gap-2 mt-auto">
                  <button class="btn btn-outline-secondary btn-sm w-100">
                    <i class="bi bi-eye"></i> View
                  </button>
                  <button class="btn btn-primary btn-sm w-100">
                    <i class="bi bi-download"></i> Download
                  </button>
                  <button class="btn btn-outline-danger btn-sm delete-btn">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer OUTSIDE container -->
      <div id="footerContainer"></div>
    </div>

    <!-- ================= LOAD PARTIALS ================= -->
    <script>
      async function loadComponent(id, file) {
        try {
          const res = await fetch(file);
          const html = await res.text();
          document.getElementById(id).innerHTML = html;

          // 🔹 highlight active sidebar link AFTER sidebar loads
          if (id === "sidebarContainer") {
            const currentPage = window.location.pathname.split("/").pop();
            const links = document.querySelectorAll(".sidebar-nav a");

            links.forEach((link) => {
              const linkPage = link.getAttribute("href").split("/").pop();

              if (currentPage === linkPage) {
                link.classList.add("active");
              }
            });
          }
        } catch (e) {
          console.error("Component load error:", file);
        }
      }

      loadComponent("sidebarContainer", "../../layouts/sidebar-faculty.html");
      loadComponent("headerContainer", "../../layouts/header.html");
      loadComponent("footerContainer", "../../layouts/footer.html");

      /* ✅ HAMBURGER SIDEBAR TOGGLE */
      document.addEventListener("click", function (e) {
        const sidebar = document.querySelector("#sidebar");

        if (!sidebar) return;

        /* MOBILE MENU */
        if (e.target.closest("#menuToggle")) {
          sidebar.classList.toggle("show");
        }

        /* COLLAPSE SIDEBAR */
        if (e.target.closest("#collapseSidebarBtn")) {
          sidebar.classList.toggle("collapsed");
          document.body.classList.toggle("sidebar-collapsed");
        }
      });
      /* =====================================================
       PERMISSION MOCK (frontend responsibility)
       Replace later with API/JWT data
    ===================================================== */
      const facultyPermissions = {
        resources: {
          create: true,
          delete: true, // change to false to test UI
        },
      };

      // hide upload if not allowed
      if (!facultyPermissions.resources.create) {
        document.getElementById("uploadBtn")?.remove();
      }

      // disable delete if not allowed
      if (!facultyPermissions.resources.delete) {
        document
          .querySelectorAll(".delete-btn")
          .forEach((btn) => (btn.style.display = "none"));
      }

      /* ================= FILE TYPE ICONS ================= */

      document.querySelectorAll(".resource-card").forEach((card) => {
        const type = card.dataset.type;
        const icon = card.querySelector(".resource-icon");

        let iconClass = "bi-file-earmark";

        if (type === "pdf") iconClass = "bi-file-earmark-pdf-fill text-danger";
        if (type === "ppt") iconClass = "bi-file-earmark-ppt-fill text-warning";
        if (type === "doc")
          iconClass = "bi-file-earmark-word-fill text-primary";
        if (type === "zip")
          iconClass = "bi-file-earmark-zip-fill text-secondary";

        icon.className = `bi ${iconClass} fs-5`;
      });
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
