<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grading Hub</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <link rel="stylesheet" href="../../assets/css/faculty.css" />

    <style>
      /* Chart size fix */
      .grade-chart-container {
        height: 300px;
        position: relative;
      }

      /* small UI polish */
      .card {
        border-radius: 14px;
      }
    </style>
  </head>

  <body>
    <div id="sidebarContainer"></div>

    <div class="main-content">
      <div id="headerContainer"></div>

      <main class="container-fluid py-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h3 class="fw-bold mb-0">Grading Hub</h3>

          <div class="d-flex gap-2">
            <button id="bulkUploadBtn" class="btn btn-outline-primary">
              <i class="bi bi-upload"></i> Bulk Upload
            </button>

            <button id="enterGradesBtn" class="btn btn-success">
              + Enter Grades
            </button>
          </div>
        </div>

        <!-- Filters -->
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label fw-semibold">Select Course</label>
                <select class="form-select">
                  <option>Computer Networks</option>
                  <option>Machine Learning</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label fw-semibold">Semester</label>
                <select class="form-select">
                  <option>Sem 1</option>
                  <option>Sem 2</option>
                </select>
              </div>

              <div class="col-md-4 d-flex align-items-end">
                <button class="btn btn-primary w-100">Apply Filter</button>
              </div>
            </div>
          </div>
        </div>

        

        <!-- Table -->
        <div class="card shadow-sm border-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Student Name</th>
                  <th>Enrollment</th>
                  <th>Marks</th>
                  <th>Grade</th>
                  <th width="120">Action</th>
                </tr>
              </thead>

              <tbody id="gradingTableBody">
                <tr data-locked="false">
                  <td class="fw-semibold">Rahul Sharma</td>
                  <td>ENR001</td>
                  <td>85</td>
                  <td><span class="badge bg-success">A</span></td>
                  <td>
                    <button
                      class="btn btn-outline-primary btn-sm edit-grade-btn"
                    >
                      Edit
                    </button>
                  </td>
                </tr>

                <tr data-locked="true">
                  <td class="fw-semibold">Priya Patel</td>
                  <td>ENR002</td>
                  <td>72</td>
                  <td><span class="badge bg-warning text-dark">B</span></td>
                  <td>
                    <button class="btn btn-outline-secondary btn-sm" disabled>
                      Locked
                    </button>
                  </td>
                </tr>

                <tr data-locked="false">
                  <td class="fw-semibold">Amit Verma</td>
                  <td>ENR003</td>
                  <td>60</td>
                  <td><span class="badge bg-info text-dark">C</span></td>
                  <td>
                    <button
                      class="btn btn-outline-primary btn-sm edit-grade-btn"
                    >
                      Edit
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Chart -->
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="fw-semibold mb-0">Grade Distribution</h5>

              <small class="text-muted">
                Auto updates when grades change
              </small>
            </div>

            <div class="grade-chart-container">
              <canvas id="gradeDistributionChart"></canvas>
            </div>
          </div>
        </div>

        
      </main>



      <div id="footerContainer"></div>
    </div>

    <!-- Bulk Upload Modal -->

    <div class="modal fade" id="bulkUploadModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Bulk Grade Upload</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <p class="text-muted small">
              Upload CSV format:
              <strong>Enrollment,Marks</strong>
            </p>

            <input
              type="file"
              id="gradeFileInput"
              class="form-control"
              accept=".csv"
            />

            <div class="small text-muted mt-3">
              Example:<br />
              ENR001,85<br />
              ENR002,72
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-light" data-bs-dismiss="modal">
              Cancel
            </button>
            <button id="importGradesBtn" class="btn btn-primary">Import</button>
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->

    <script>
      async function loadComponent(id, file) {
        const res = await fetch(file);
        const html = await res.text();

        document.getElementById(id).innerHTML = html;

        if (id === "sidebarContainer") {
          const currentPage = window.location.pathname.split("/").pop();

          document.querySelectorAll(".sidebar-nav a").forEach((link) => {
            const linkPage = link.getAttribute("href").split("/").pop();

            if (currentPage === linkPage) {
              link.classList.add("active");
            }
          });
        }
      }

      loadComponent("sidebarContainer", "../../layouts/sidebar-faculty.html");
      loadComponent("headerContainer", "../../layouts/header.html");
      loadComponent("footerContainer", "../../layouts/footer.html");

      document.addEventListener("click", function (e) {
        const sidebar = document.querySelector("#sidebar");
        if (!sidebar) return;

        if (e.target.closest("#menuToggle")) {
          sidebar.classList.toggle("show");
        }

        if (e.target.closest("#collapseSidebarBtn")) {
          sidebar.classList.toggle("collapsed");
          document.body.classList.toggle("sidebar-collapsed");
        }
      });

      /* ================= GRADE LOGIC ================= */

      function getGradeFromMarks(marks) {
        marks = Number(marks);

        if (marks >= 85) return "A";
        if (marks >= 70) return "B";
        if (marks >= 50) return "C";

        return "F";
      }

      function getBadge(grade) {
        if (grade === "A") return `<span class="badge bg-success">A</span>`;
        if (grade === "B")
          return `<span class="badge bg-warning text-dark">B</span>`;
        if (grade === "C")
          return `<span class="badge bg-info text-dark">C</span>`;

        return `<span class="badge bg-danger">F</span>`;
      }

      /* ================= CHART ================= */

      let gradeChart;

      function updateGradeChart() {
        const rows = document.querySelectorAll("#gradingTableBody tr");

        let counts = { A: 0, B: 0, C: 0, F: 0 };

        rows.forEach((row) => {
          const grade = row.children[3].innerText.trim();

          if (counts[grade] !== undefined) {
            counts[grade]++;
          }
        });

        const data = [counts.A, counts.B, counts.C, counts.F];

        if (!gradeChart) {
          const ctx = document.getElementById("gradeDistributionChart");

          gradeChart = new Chart(ctx, {
            type: "doughnut",
            data: {
              labels: ["A", "B", "C", "F"],
              datasets: [
                {
                  data: data,
                  backgroundColor: ["#22c55e", "#f59e0b", "#0ea5e9", "#ef4444"],
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              cutout: "70%",
              plugins: {
                legend: { position: "bottom" },
              },
              animation: {
                duration: 900,
              },
            },
          });
        } else {
          gradeChart.data.datasets[0].data = data;
          gradeChart.update();
        }
      }

      updateGradeChart();

      /* ================= BULK UPLOAD ================= */

      let bulkModal = new bootstrap.Modal(
        document.getElementById("bulkUploadModal"),
      );

      document
        .getElementById("bulkUploadBtn")
        .addEventListener("click", () => bulkModal.show());

      document
        .getElementById("importGradesBtn")
        .addEventListener("click", function () {
          const file = document.getElementById("gradeFileInput").files[0];

          if (!file) {
            alert("Select CSV file");
            return;
          }

          const reader = new FileReader();

          reader.onload = function (e) {
            const lines = e.target.result.split("\n");

            const rows = document.querySelectorAll("#gradingTableBody tr");

            lines.forEach((line) => {
              const [enroll, marks] = line.split(",");

              rows.forEach((row) => {
                if (row.children[1].innerText.trim() === enroll) {
                  const grade = getGradeFromMarks(marks);

                  row.children[2].innerText = marks;
                  row.children[3].innerHTML = getBadge(grade);
                }
              });
            });

            updateGradeChart();
          };

          reader.readAsText(file);

          bulkModal.hide();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
