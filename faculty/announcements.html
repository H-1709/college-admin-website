<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Faculty Announcements</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/faculty.css" />

    <style>
      .pinned-badge {
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div id="sidebarContainer"></div>

    <div class="main-content">
      <div id="headerContainer"></div>

      <main class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="fw-bold mb-0">Announcements</h2>

          <button id="addAnnouncementBtn" class="btn btn-primary">
            <i class="bi bi-megaphone"></i> Create Announcement
          </button>
        </div>

        <div class="row g-4" id="announcementGrid">
          <!-- Card 1 -->
          <div class="col-lg-6">
            <div class="card border-0 shadow-sm h-100">
              <div class="card-body d-flex flex-column">
                <div
                  class="d-flex justify-content-between align-items-start announcement-header"
                >
                  <h5 class="fw-bold mb-0">Mid Semester Exam Schedule</h5>

                  <span class="badge bg-warning text-dark pinned-badge">
                    <i class="bi bi-pin-angle-fill"></i> Pinned
                  </span>
                </div>

                <p class="text-muted flex-grow-1 mt-2">
                  The mid semester exams will begin from 15th May. Students are
                  advised to check the timetable.
                </p>

                <div
                  class="d-flex justify-content-between align-items-center mt-3"
                >
                  <small class="text-muted">Posted: 1 May 2026</small>

                  <div class="d-flex gap-2">
                    <button
                      class="btn btn-outline-secondary btn-sm pin-announcement-btn"
                    >
                      <i class="bi bi-pin"></i>
                    </button>

                    <button
                      class="btn btn-outline-primary btn-sm view-announcement-btn"
                    >
                      View
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Card 2 -->
          <div class="col-lg-6">
            <div class="card border-0 shadow-sm h-100">
              <div class="card-body d-flex flex-column">
                <div
                  class="d-flex justify-content-between align-items-start announcement-header"
                >
                  <h5 class="fw-bold mb-0">Holiday Notice</h5>

                  <!-- badge placeholder -->
                  <div class="badge-placeholder"></div>
                </div>

                <p class="text-muted flex-grow-1 mt-2">
                  College will remain closed on account of public holiday this
                  Friday.
                </p>

                <div
                  class="d-flex justify-content-between align-items-center mt-3"
                >
                  <small class="text-muted">Posted: 24 Jan 2026</small>

                  <div class="d-flex gap-2">
                    <button
                      class="btn btn-outline-secondary btn-sm pin-announcement-btn"
                    >
                      <i class="bi bi-pin"></i>
                    </button>

                    <button
                      class="btn btn-outline-primary btn-sm view-announcement-btn"
                    >
                      View
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <div id="footerContainer"></div>
    </div>

    <script>
      async function loadComponent(id, file) {
        try {
          const res = await fetch(file);
          const html = await res.text();

          document.getElementById(id).innerHTML = html;

          if (id === "sidebarContainer") {
            const currentPage = window.location.pathname.split("/").pop();

            document.querySelectorAll(".sidebar-nav a").forEach((link) => {
              const linkPage = link.getAttribute("href").split("/").pop();

              if (currentPage === linkPage) {
                link.classList.add("active");
              }
            });
          }
        } catch (e) {
          console.error("Component load error:", file);
        }
      }

      loadComponent("sidebarContainer", "../../layouts/sidebar-faculty.html");
      loadComponent("headerContainer", "../../layouts/header.html");
      loadComponent("footerContainer", "../../layouts/footer.html");

      document.addEventListener("click", function (e) {
        const sidebar = document.querySelector("#sidebar");

        if (!sidebar) return;

        if (e.target.closest("#menuToggle")) {
          sidebar.classList.toggle("show");
        }

        if (e.target.closest("#collapseSidebarBtn")) {
          sidebar.classList.toggle("collapsed");
          document.body.classList.toggle("sidebar-collapsed");
        }
      });

      /* ================= PIN LOGIC ================= */

      document.addEventListener("click", function (e) {
        const pinBtn = e.target.closest(".pin-announcement-btn");
        if (!pinBtn) return;

        const card = pinBtn.closest(".col-lg-6");
        const grid = document.getElementById("announcementGrid");
        const header = card.querySelector(".announcement-header");

        let badge = header.querySelector(".pinned-badge");

        /* IF already pinned → UNPIN */
        if (badge) {
          badge.remove();
        } else {

        /* IF not pinned → PIN */
          badge = document.createElement("span");

          badge.className = "badge bg-warning text-dark pinned-badge";

          badge.innerHTML = '<i class="bi bi-pin-angle-fill"></i> Pinned';

          header.appendChild(badge);

          /* move pinned card to top */
          grid.prepend(card);
        }
      });

      /* ================= PERMISSIONS ================= */

      const facultyPermissions = {
        announcements: {
          create: false,
          read: true,
        },
      };

      if (!facultyPermissions.announcements.create) {
        document.getElementById("addAnnouncementBtn")?.remove();
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
