<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faculty Profile</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">\
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Global CSS -->
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/faculty.css" />
</head>

<body>

  <!-- ================= SIDEBAR ================= -->
  <div id="sidebarContainer"></div>

  <!-- ================= MAIN CONTENT ================= -->
  <div class="main-content">

    <!-- Header -->
    <div id="headerContainer"></div>

    <!-- ================= PAGE BODY ================= -->
    <main class="container-fluid py-4">

      <div class="mb-4">
        <h2 class="fw-bold mb-1">My Profile</h2>
        <p class="text-muted mb-0">Manage your personal information</p>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">

          <!-- Profile Form -->
          <form id="profileForm">

            <div class="row g-3">

              <div class="col-md-6">
                <label for="fullName" class="form-label fw-semibold">Full Name</label>
                <input
                  type="text"
                  id="fullName"
                  name="fullName"
                  class="form-control"
                  value="Gaurang Sir"
                  required
                >
              </div>

              <div class="col-md-6">
                <label for="email" class="form-label fw-semibold">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-control"
                  value="gaurang@college.edu"
                  required
                >
              </div>

              <div class="col-md-6">
                <label for="department" class="form-label fw-semibold">Department</label>
                <input
                  type="text"
                  id="department"
                  name="department"
                  class="form-control"
                  value="Computer Engineering"
                >
              </div>

              <div class="col-md-6">
                <label for="phone" class="form-label fw-semibold">Phone</label>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  class="form-control"
                  value="+91 9876543210"
                >
              </div>

            </div>

            <div class="text-end mt-4">
              <button type="submit" id="saveProfileBtn" class="btn btn-primary">
                Save Changes
              </button>
            </div>

          </form>

        </div>
      </div>

    </main>

    <!-- Footer -->
    <div id="footerContainer"></div>

  </div>

  <!-- ================= LOAD PARTIALS ================= -->
  <script>
    
async function loadComponent(id, file) {
  try {
    const res = await fetch(file);
    const html = await res.text();
    document.getElementById(id).innerHTML = html;

    // 🔹 highlight active sidebar link AFTER sidebar loads
    if (id === "sidebarContainer") {

      const currentPage = window.location.pathname.split("/").pop();
      const links = document.querySelectorAll(".sidebar-nav a");

      links.forEach(link => {

        const linkPage = link.getAttribute("href").split("/").pop();

        if (currentPage === linkPage) {
          link.classList.add("active");
        }

      });

    }

  } catch (e) {
    console.error("Component load error:", file);
  }
}
loadComponent('sidebarContainer','../../layouts/sidebar-faculty.html');
loadComponent('headerContainer','../../layouts/header.html');
loadComponent('footerContainer','../../layouts/footer.html');
/* ENABLE BOOTSTRAP TOOLTIPS */
setTimeout(() => {
  const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
  tooltipTriggerList.forEach(el => new bootstrap.Tooltip(el));
}, 300);



/* ✅ HAMBURGER SIDEBAR TOGGLE */
document.addEventListener("click", function(e) {

  const sidebar = document.querySelector("#sidebar");

  if (!sidebar) return;

  /* MOBILE MENU */
  if (e.target.closest("#menuToggle")) {
    sidebar.classList.toggle("show");
  }

  /* COLLAPSE SIDEBAR */
  if (e.target.closest("#collapseSidebarBtn")) {
    sidebar.classList.toggle("collapsed");
    document.body.classList.toggle("sidebar-collapsed");
  }

});
    /* ================= PERMISSION MOCK ================= */
    const facultyPermissions = {
      profile: { update: true }
    };

    if (!facultyPermissions.profile.update) {
      document.querySelectorAll('#profileForm input')
        .forEach(inp => inp.disabled = true);
      document.getElementById('saveProfileBtn')?.remove();
    }

    /* ================= FORM SUBMIT ================= */
    document.getElementById('profileForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const formData = new FormData(this);

      // 🔌 Future API call
      // await fetch('/api/faculty/profile', { method:'PUT', body: formData });

      console.log('Profile data:', Object.fromEntries(formData));

      // simple UX feedback
      const btn = document.getElementById('saveProfileBtn');
      btn.textContent = 'Saved ✓';
      btn.disabled = true;

      setTimeout(() => {
        btn.textContent = 'Save Changes';
        btn.disabled = false;
      }, 1500);
    });
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
