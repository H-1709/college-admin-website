<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cafeteria - UniPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/base.css">
    <link rel="stylesheet" href="../../../assets/css/layout.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>
        <div id="page-content-wrapper">
            <div id="header-container"></div>
            <div class="container-fluid px-4 py-4">
                <div class="row mb-4">
                    <div class="col-md-8"><h3>Cafeteria Menu</h3></div>
                    <div class="col-md-4 text-end">
                        <div class="card bg-light p-2 d-inline-block border">
                            <small class="text-muted d-block">ID Wallet Balance</small>
                            <span class="fw-bold text-success">$45.50</span>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white fw-bold">Daily Specials</div>
                            <ul class="list-group list-group-flush">
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>Grilled Chicken & Rice</span>
                                    <strong>$6.50</strong>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>Vegetarian Pasta</span>
                                    <strong>$5.00</strong>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>Garden Salad</span>
                                    <strong>$4.00</strong>
                                </li>
                            </ul>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white fw-bold">Beverages</div>
                            <ul class="list-group list-group-flush">
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>Iced Latte</span>
                                    <strong>$3.50</strong>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>Fresh Orange Juice</span>
                                    <strong>$3.00</strong>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>Bottled Water</span>
                                    <strong>$1.00</strong>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../utils/helpers.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            await loadComponent("sidebar-container", "../../layouts/sidebar-student.html");
            await loadComponent("header-container", "../../layouts/header.html");
        });
    </script>
</body>
</html>
