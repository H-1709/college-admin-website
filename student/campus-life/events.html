<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Events - UniPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/base.css">
    <link rel="stylesheet" href="../../../assets/css/layout.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>
        <div id="page-content-wrapper">
            <div id="header-container"></div>
            <div class="container-fluid px-4 py-4">
                <h3 class="mb-4">Upcoming Events</h3>
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card h-100 shadow-sm border-0">
                            <img src="https://via.placeholder.com/400x200" class="card-img-top" alt="Event">
                            <div class="card-body">
                                <div class="badge bg-primary mb-2">Academic</div>
                                <h5 class="card-title">AI & Robotics Workshop</h5>
                                <p class="card-text text-muted small"><i class="bi bi-calendar-event"></i> Feb 25 | <i class="bi bi-geo-alt"></i> Main Auditorium</p>
                                <button class="btn btn-sm btn-outline-primary w-100">Register Now</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card h-100 shadow-sm border-0">
                            <img src="https://via.placeholder.com/400x200" class="card-img-top" alt="Event">
                            <div class="card-body">
                                <div class="badge bg-success mb-2">Culture</div>
                                <h5 class="card-title">Spring Music Fest</h5>
                                <p class="card-text text-muted small"><i class="bi bi-calendar-event"></i> March 02 | <i class="bi bi-geo-alt"></i> Open Grounds</p>
                                <button class="btn btn-sm btn-outline-primary w-100">Get Tickets</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../utils/helpers.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            await loadComponent("sidebar-container", "../../layouts/sidebar-student.html");
            await loadComponent("header-container", "../../layouts/header.html");
        });
    </script>
</body>
</html>
