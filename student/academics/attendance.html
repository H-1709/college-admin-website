<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendance</title>

  <!-- Bootstrap 5.3.x -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Base + Student Styles -->
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/student.css">
</head>
<body>

  <!-- Header -->
  <div id="header"></div>

  <div class="container-fluid">
    <div class="row">

      <!-- Sidebar -->
      <aside class="col-lg-2 col-md-3 d-none d-md-block p-0">
        <div id="sidebar-student"></div>
      </aside>

      <!-- Main Content -->
      <main class="col-lg-10 col-md-9 ms-sm-auto px-4 py-4">

        <!-- Page Header -->
        <section class="mb-4">
          <h1 class="h3 fw-semibold">Attendance</h1>
          <p class="text-muted mb-0">Subject-wise attendance overview</p>
        </section>

        <!-- Attendance Table -->
        <section class="card shadow-sm">
          <div class="card-header bg-white fw-semibold">
            Attendance Details
          </div>

          <div class="card-body table-responsive">
            <table class="table table-bordered align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Subject</th>
                  <th>Total Classes</th>
                  <th>Attended</th>
                  <th>Attendance %</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Data Structures</td>
                  <td>42</td>
                  <td>36</td>
                  <td>85%</td>
                  <td>
                    <span class="badge bg-success">Safe</span>
                  </td>
                </tr>
                <tr>
                  <td>Operating Systems</td>
                  <td>40</td>
                  <td>30</td>
                  <td>75%</td>
                  <td>
                    <span class="badge bg-warning text-dark">Warning</span>
                  </td>
                </tr>
                <tr>
                  <td>Computer Networks</td>
                  <td>38</td>
                  <td>26</td>
                  <td>68%</td>
                  <td>
                    <span class="badge bg-danger">Shortage</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

      </main>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Layout Includes -->
  <script src="../../assets/js/utils/include.js"></script>
  <script>
    includeHTML("header", "../../layouts/header.html");
    includeHTML("sidebar-student", "../../layouts/sidebar-student.html");
    includeHTML("footer", "../../layouts/footer.html");
  </script>

</body>
</html>
