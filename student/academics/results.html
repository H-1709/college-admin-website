<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Results - UniPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/base.css">
    <link rel="stylesheet" href="../../../assets/css/layout.css">
</head>
<body>

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>
        <div id="page-content-wrapper">
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>Academic Results</h3>
                    <button class="btn btn-outline-primary btn-sm"><i class="bi bi-download"></i> Download PDF</button>
                </div>

                <div class="row mb-4 text-center">
                    <div class="col-md-4">
                        <div class="card p-3 shadow-sm border-primary">
                            <h6 class="text-muted small">Current Semester GPA</h6>
                            <h2 class="text-primary fw-bold">3.85</h2>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3 shadow-sm">
                            <h6 class="text-muted small">Cumulative GPA (CGPA)</h6>
                            <h2 class="fw-bold">3.72</h2>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3 shadow-sm">
                            <h6 class="text-muted small">Rank in Batch</h6>
                            <h2 class="fw-bold">#14</h2>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Semester 4 - Fall 2025</h5>
                        <select class="form-select form-select-sm w-auto">
                            <option>Semester 4</option>
                            <option>Semester 3</option>
                        </select>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Subject Code</th>
                                    <th>Subject Name</th>
                                    <th>Internal (40)</th>
                                    <th>External (60)</th>
                                    <th>Grade</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>CS401</td>
                                    <td><strong>Data Structures</strong></td>
                                    <td>36</td>
                                    <td>52</td>
                                    <td>A</td>
                                    <td><span class="badge bg-success">Pass</span></td>
                                </tr>
                                <tr>
                                    <td>CS402</td>
                                    <td><strong>Database Systems</strong></td>
                                    <td>34</td>
                                    <td>48</td>
                                    <td>A-</td>
                                    <td><span class="badge bg-success">Pass</span></td>
                                </tr>
                                <tr>
                                    <td>MA405</td>
                                    <td><strong>Discrete Math</strong></td>
                                    <td>28</td>
                                    <td>40</td>
                                    <td>B+</td>
                                    <td><span class="badge bg-success">Pass</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../utils/helpers.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            await loadComponent("sidebar-container", "../../layouts/sidebar-student.html");
            await loadComponent("header-container", "../../layouts/header.html");
        });
    </script>
</body>
</html>
