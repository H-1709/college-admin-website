<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Results</title>

  <!-- Bootstrap 5.3.x -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Base + Student Styles -->
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/student.css">
</head>
<body>

  <!-- Header -->
  <div id="header"></div>

  <div class="container-fluid">
    <div class="row">

      <!-- Sidebar -->
      <aside class="col-lg-2 col-md-3 d-none d-md-block p-0">
        <div id="sidebar-student"></div>
      </aside>

      <!-- Main Content -->
      <main class="col-lg-10 col-md-9 ms-sm-auto px-4 py-4">

        <!-- Page Header -->
        <section class="mb-4 d-flex flex-wrap justify-content-between align-items-center">
          <div>
            <h1 class="h3 fw-semibold">Results</h1>
            <p class="text-muted mb-0">Semester-wise academic performance</p>
          </div>

          <!-- Semester Selector -->
          <div class="mt-3 mt-md-0">
            <select class="form-select">
              <option selected>Semester 4</option>
              <option>Semester 3</option>
              <option>Semester 2</option>
              <option>Semester 1</option>
            </select>
          </div>
        </section>

        <!-- GPA Summary -->
        <section class="row mb-4">
          <div class="col-md-4">
            <div class="card shadow-sm">
              <div class="card-body">
                <p class="text-muted mb-1">SGPA</p>
                <h4 class="mb-0">8.2</h4>
              </div>
            </div>
          </div>
        </section>

        <!-- Results Table -->
        <section class="card shadow-sm">
          <div class="card-header bg-white fw-semibold">
            Subject-wise Results
          </div>

          <div class="card-body table-responsive">
            <table class="table table-bordered align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Subject</th>
                  <th>Internal</th>
                  <th>External</th>
                  <th>Total</th>
                  <th>Grade</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Data Structures</td>
                  <td>28</td>
                  <td>52</td>
                  <td>80</td>
                  <td>A</td>
                  <td>
                    <span class="badge bg-success">Pass</span>
                  </td>
                </tr>
                <tr>
                  <td>Operating Systems</td>
                  <td>26</td>
                  <td>48</td>
                  <td>74</td>
                  <td>B+</td>
                  <td>
                    <span class="badge bg-success">Pass</span>
                  </td>
                </tr>
                <tr>
                  <td>Computer Networks</td>
                  <td>22</td>
                  <td>40</td>
                  <td>62</td>
                  <td>C</td>
                  <td>
                    <span class="badge bg-success">Pass</span>
                  </td>
                </tr>
                <tr>
                  <td>DBMS</td>
                  <td>18</td>
                  <td>28</td>
                  <td>46</td>
                  <td>D</td>
                  <td>
                    <span class="badge bg-danger">Fail</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

      </main>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Layout Includes -->
  <script src="../../assets/js/utils/include.js"></script>
  <script>
    includeHTML("header", "../../layouts/header.html");
    includeHTML("sidebar-student", "../../layouts/sidebar-student.html");
    includeHTML("footer", "../../layouts/footer.html");
  </script>

</body>
</html>
