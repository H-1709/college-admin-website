<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study Materials</title>

  <!-- Bootstrap 5.3.x -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Base + Student Styles -->
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/student.css">
</head>
<body>

  <!-- Header -->
  <div id="header"></div>

  <div class="container-fluid">
    <div class="row">

      <!-- Sidebar -->
      <aside class="col-lg-2 col-md-3 d-none d-md-block p-0">
        <div id="sidebar-student"></div>
      </aside>

      <!-- Main Content -->
      <main class="col-lg-10 col-md-9 ms-sm-auto px-4 py-4">

        <!-- Page Header -->
        <section class="mb-4">
          <h1 class="h3 fw-semibold">Study Materials</h1>
          <p class="text-muted mb-0">Access subject-wise learning resources</p>
        </section>

        <!-- Materials Accordion -->
        <section class="accordion" id="materialsAccordion">

          <!-- Data Structures -->
          <div class="accordion-item mb-2">
            <h2 class="accordion-header">
              <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#ds">
                Data Structures
              </button>
            </h2>
            <div id="ds" class="accordion-collapse collapse show">
              <div class="accordion-body">
                <ul class="list-group list-group-flush">
                  <li class="list-group-item d-flex justify-content-between align-items-center">
                    Arrays & Linked Lists (PDF)
                    <span class="badge bg-secondary">PDF</span>
                  </li>
                  <li class="list-group-item d-flex justify-content-between align-items-center">
                    Trees & Graphs (PPT)
                    <span class="badge bg-info text-dark">PPT</span>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <!-- Operating Systems -->
          <div class="accordion-item mb-2">
            <h2 class="accordion-header">
              <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#os">
                Operating Systems
              </button>
            </h2>
            <div id="os" class="accordion-collapse collapse">
              <div class="accordion-body">
                <ul class="list-group list-group-flush">
                  <li class="list-group-item d-flex justify-content-between align-items-center">
                    Process Scheduling (PDF)
                    <span class="badge bg-secondary">PDF</span>
                  </li>
                  <li class="list-group-item d-flex justify-content-between align-items-center">
                    Memory Management (Video)
                    <span class="badge bg-danger">Video</span>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <!-- DBMS -->
          <div class="accordion-item mb-2">
            <h2 class="accordion-header">
              <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#dbms">
                Database Management Systems
              </button>
            </h2>
            <div id="dbms" class="accordion-collapse collapse">
              <div class="accordion-body">
                <ul class="list-group list-group-flush">
                  <li class="list-group-item d-flex justify-content-between align-items-center">
                    Normalization (PDF)
                    <span class="badge bg-secondary">PDF</span>
                  </li>
                  <li class="list-group-item d-flex justify-content-between align-items-center">
                    SQL Joins (PPT)
                    <span class="badge bg-info text-dark">PPT</span>
                  </li>
                </ul>
              </div>
            </div>
          </div>

        </section>

      </main>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Layout Includes -->
  <script src="../../assets/js/utils/include.js"></script>
  <script>
    includeHTML("header", "../../layouts/header.html");
    includeHTML("sidebar-student", "../../layouts/sidebar-student.html");
    includeHTML("footer", "../../layouts/footer.html");
  </script>

</body>
</html>
