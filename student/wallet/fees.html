<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Fees</title>

    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <style>
      /* ===== GLOBAL ===== */
      body {
        background: #f5f7fb;
      }

      /* ===== HEADER ===== */
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        animation: fadeSlide 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .page-header h2 {
        font-weight: 700;
      }
      .page-header p {
        margin: 0;
        color: #6c757d;
      }

      /* ===== DROPDOWN ===== */
      .form-select {
        border-radius: 10px;
        padding: 6px 12px;
        border: 1px solid #d1d5db;
      }

      .form-select:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
      }

      /* ===== CARD ===== */
      .card-modern {
        background: #fff;
        border-radius: 18px;
        padding: 22px;
        border: 1px solid #e5e7eb;
        border-left: 5px solid transparent;

        display: flex;
        justify-content: space-between;
        align-items: flex-start;

        transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
        opacity: 0;
        transform: translateY(20px);
        animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;

        will-change: transform;
      }

      /* COLORS */
      .border-green {
        border-left-color: #22c55e;
      }
      .border-yellow {
        border-left-color: #f59e0b;
      }

      /* HOVER */
      .card-modern:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
      }

      /* ===== LEFT CONTENT ===== */
      .card-left {
        max-width: 70%;
      }

      .fee-label {
        font-size: 13px;
        color: #6c757d;
      }

      .fee-amount {
        font-size: 30px;
        font-weight: 700;
        margin: 6px 0;
      }

      .fee-sub {
        font-size: 13px;
        color: #6c757d;
      }

      /* ===== RIGHT CONTENT ===== */
      .card-right {
        text-align: right;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }

      /* ===== SECTION ===== */
      .section-card {
        background: #fff;
        border-radius: 16px;
        padding: 22px;
        margin-top: 25px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
        animation: fadeUp 0.5s ease forwards;
      }

      .section-title {
        font-weight: 600;
        margin-bottom: 15px;
      }

      /* ===== BREAKDOWN ===== */
      .fee-row {
        display: flex;
        justify-content: space-between;
        padding: 14px 0;
        border-bottom: 1px solid #eee;
        transition: 0.2s;
      }

      .fee-row:hover {
        background: #f9fafb;
        padding: 0 8px;
        border-radius: 8px;
      }

      .fee-row.total {
        font-weight: 700;
        font-size: 16px;
        border-top: 2px solid #ddd;
      }

      /* ===== PAYMENT ===== */
      .payment-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 0;
        border-bottom: 1px solid #eee;
        transition: 0.2s;
      }

      .payment-item:hover {
        background: #f9fafb;
        padding: 0 8px;
        border-radius: 8px;
      }

      .payment-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      
      .semester-select {
  display: flex;
  align-items: center;
  gap: 8px;

  background: #fff;
  padding: 6px 12px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;

  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

.semester-select i {
  color: #3b82f6;
  font-size: 16px;
}

.semester-select .form-select {
  border: none;
  box-shadow: none;
  padding: 4px;
  font-weight: 500;
  background: transparent;
}

.semester-select .form-select:focus {
  box-shadow: none;
}
      /* ===== ANIMATION ===== */
      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .card-modern {
          flex-direction: column;
          gap: 12px;
        }

        .card-right {
          align-items: flex-start;
          text-align: left;
        }

        .page-header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
      }
      .semester-select:hover {
  border-color: #3b82f6;
}
    </style>
  </head>

  <body>
    <div id="sidebarContainer"></div>

    <div class="main-content">
      <div id="headerContainer"></div>

      <main class="container-fluid py-4">
        <!-- HEADER -->
        <div class="page-header">
          <div>
            <h2>Fees</h2>
            <p>Semester-wise fee details</p>
          </div>
<div class="semester-select">
  <i class="bi bi-calendar3"></i>
          <select class="form-select">
    <option>Sem 1</option>
    <option>Sem 2</option>
    <option>Sem 3</option>
    <option selected>Sem 4</option>
    <option>Sem 5</option>
    <option>Sem 6</option>
    <option>Sem 7</option>
    <option>Sem 8</option>
  </select>
    </div>
        </div>

        <!-- CARDS -->
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="card-modern border-green">
              <div class="card-left">
                <p class="fee-label">Semester Fee</p>
                <p class="fee-amount">₹60,000</p>
                <p class="fee-sub">Paid on 10 Jan 2026</p>
              </div>

              <div class="card-right">
                <span class="badge bg-success">Paid</span>
                <button class="btn btn-sm btn-outline-primary">
                  <i class="bi bi-download"></i> Receipt
                </button>
              </div>
            </div>
          </div>

          <div class="col-lg-6">
            <div class="card-modern border-yellow">
              <div class="card-left">
                <p class="fee-label">Exam Form Fee</p>
                <p class="fee-amount">₹1,500</p>
                <p class="text-danger small">Deadline: 25 Apr 2026</p>
              </div>

              <div class="card-right">
                <span class="badge bg-warning text-dark">Pending</span>
                <button class="btn btn-danger btn-sm">Pay Now</button>
              </div>
            </div>
          </div>
        </div>

        <!-- BREAKDOWN -->
        <div class="section-card">
          <h5 class="section-title">Fee Breakdown</h5>

          <div class="fee-row">
            <span>Material Fee</span><span>₹500</span>
          </div>
          <div class="fee-row"><span>Lab Fee</span><span>₹500</span></div>
          <div class="fee-row"><span>Library Fee</span><span>₹500</span></div>

          <div class="fee-row total">
            <span>Total</span>
            <span>₹1,500</span>
          </div>
        </div>

        <!-- PAYMENT HISTORY -->
        <div class="section-card">
          <h5 class="section-title">Payment History</h5>

          <div class="payment-item">
            <div>
              <p class="mb-0">Semester Fee</p>
              <small class="text-muted">10 Jan 2026</small>
            </div>

            <div class="payment-right">
              <strong>₹60,000</strong>
              <span class="badge bg-success">Paid</span>
              <button class="btn btn-sm btn-outline-primary">
                <i class="bi bi-download"></i>
              </button>
            </div>
          </div>

          <div class="payment-item">
            <div>
              <p class="mb-0">Exam Fee</p>
              <small class="text-muted">--</small>
            </div>

            <div class="payment-right">
              <strong>₹1,500</strong>
              <span class="badge bg-warning text-dark">Pending</span>
            </div>
          </div>
        </div>
      </main>

      <div id="footerContainer"></div>
    </div>

    <script src="../../assets/js/student.js"></script>
    <script>
      initLayout("../../");
    </script>
  </body>
</html>
