<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Profile</title>

  <!-- Bootstrap 5.3.x -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Base + Student Styles -->
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/student.css">
</head>
<body>

  <!-- Header -->
  <div id="header"></div>

  <div class="container-fluid">
    <div class="row">

      <!-- Sidebar -->
      <aside class="col-lg-2 col-md-3 d-none d-md-block p-0">
        <div id="sidebar-student"></div>
      </aside>

      <!-- Main Content -->
      <main class="col-lg-10 col-md-9 ms-sm-auto px-4 py-4">

        <!-- Page Header -->
        <section class="mb-4">
          <h1 class="h3 fw-semibold">My Profile</h1>
          <p class="text-muted mb-0">View and update your personal details</p>
        </section>

        <!-- Profile Form -->
        <form>

          <!-- Basic Information -->
          <section class="card shadow-sm mb-4">
            <div class="card-header bg-white fw-semibold">
              Basic Information
            </div>
            <div class="card-body row g-3">

              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" value="Rajyaguru Hir">
              </div>

              <div class="col-md-6">
                <label class="form-label">Enrollment Number</label>
                <input type="text" class="form-control" value="IT2023XXX" disabled>
              </div>

              <div class="col-md-6">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control" value="2004-05-10">
              </div>

              <div class="col-md-6">
                <label class="form-label">Gender</label>
                <select class="form-select">
                  <option selected>Female</option>
                  <option>Male</option>
                  <option>Other</option>
                </select>
              </div>

            </div>
          </section>

          <!-- Academic Information -->
          <section class="card shadow-sm mb-4">
            <div class="card-header bg-white fw-semibold">
              Academic Information
            </div>
            <div class="card-body row g-3">

              <div class="col-md-4">
                <label class="form-label">Department</label>
                <input type="text" class="form-control" value="Information Technology" disabled>
              </div>

              <div class="col-md-4">
                <label class="form-label">Semester</label>
                <input type="text" class="form-control" value="4" disabled>
              </div>

              <div class="col-md-4">
                <label class="form-label">Current GPA</label>
                <input type="text" class="form-control" value="8.2" disabled>
              </div>

            </div>
          </section>

          <!-- Contact Information -->
          <section class="card shadow-sm mb-4">
            <div class="card-header bg-white fw-semibold">
              Contact Information
            </div>
            <div class="card-body row g-3">

              <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" value="hirrajyaguru@gmail.com">
              </div>

              <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control" value="9XXXXXXXXX">
              </div>

              <div class="col-12">
                <label class="form-label">Address</label>
                <textarea class="form-control" rows="3">Ahmedabad, Gujarat</textarea>
              </div>

            </div>
          </section>

          <!-- Actions -->
          <section class="d-flex justify-content-end gap-2">
            <button type="reset" class="btn btn-outline-secondary">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">
              Save Changes
            </button>
          </section>

        </form>

      </main>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Layout Includes -->
  <script src="../assets/js/utils/include.js"></script>
  <script>
    includeHTML("header", "../layouts/header.html");
    includeHTML("sidebar-student", "../layouts/sidebar-student.html");
    includeHTML("footer", "../layouts/footer.html");
  </script>

</body>
</html>
