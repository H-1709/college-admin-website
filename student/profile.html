<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile - UniPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>
        <div id="page-content-wrapper">
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4">
                <h3 class="mb-4">Account Settings</h3>

                <div class="row">
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-body text-center">
                                <img src="https://via.placeholder.com/100" class="rounded-circle mb-3" alt="Avatar">
                                <h5>Johnathan Doe</h5>
                                <p class="text-muted">john.doe@university.edu</p>
                                <button class="btn btn-sm btn-outline-primary">Change Photo</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white">
                                <ul class="nav nav-tabs card-header-tabs" id="profileTabs" role="tablist">
                                    <li class="nav-item">
                                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#personal">Personal Info</button>
                                    </li>
                                    <li class="nav-item">
                                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#security">Security</button>
                                    </li>
                                </ul>
                            </div>
                            <div class="card-body">
                                <div class="tab-content" id="profileTabsContent">
                                    <div class="tab-pane fade show active" id="personal">
                                        <form>
                                            <div class="row g-3">
                                                <div class="col-md-6">
                                                    <label class="form-label">First Name</label>
                                                    <input type="text" class="form-control" value="Johnathan">
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label">Last Name</label>
                                                    <input type="text" class="form-control" value="Doe">
                                                </div>
                                                <div class="col-md-12">
                                                    <label class="form-label">Phone Number</label>
                                                    <input type="tel" class="form-control" value="+1 234 567 890">
                                                </div>
                                                <div class="col-md-12">
                                                    <label class="form-label">Address</label>
                                                    <textarea class="form-control">123 University Lane, Campus Heights</textarea>
                                                </div>
                                            </div>
                                            <button class="btn btn-primary mt-4">Save Changes</button>
                                        </form>
                                    </div>
                                    <div class="tab-pane fade" id="security">
                                        <form>
                                            <div class="mb-3">
                                                <label class="form-label">Current Password</label>
                                                <input type="password" class="form-control">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">New Password</label>
                                                <input type="password" class="form-control">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Confirm New Password</label>
                                                <input type="password" class="form-control">
                                            </div>
                                            <button class="btn btn-danger">Update Password</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../utils/helpers.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            await loadComponent("sidebar-container", "../layouts/sidebar-student.html");
            await loadComponent("header-container", "../layouts/header.html");
        });
    </script>
</body>
</html>
