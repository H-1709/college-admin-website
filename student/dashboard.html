<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/student.css">
</head>
<body>

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper">
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4">
                <h2 class="mb-4">Welcome back, <span id="studentNameDisplay">Student</span>!</h2>

                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="card card-hover bg-primary text-white h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-subtitle mb-2">Attendance</h6>
                                        <h2 class="card-title mb-0">87%</h2>
                                    </div>
                                    <i class="bi bi-calendar-check fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-hover bg-success text-white h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-subtitle mb-2">CGPA</h6>
                                        <h2 class="card-title mb-0">3.8</h2>
                                    </div>
                                    <i class="bi bi-graph-up-arrow fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-hover bg-warning text-dark h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-subtitle mb-2">Assignments</h6>
                                        <h2 class="card-title mb-0">2 Pending</h2>
                                    </div>
                                    <i class="bi bi-journal-text fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-hover bg-danger text-white h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-subtitle mb-2">Fees Due</h6>
                                        <h2 class="card-title mb-0">$500</h2>
                                    </div>
                                    <i class="bi bi-cash-coin fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="card shadow-sm h-100">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">Today's Schedule</h5>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Time</th>
                                                <th>Subject</th>
                                                <th>Room</th>
                                                <th>Status</th>
                                            </tr>
                                        </thead>
                                        <tbody id="scheduleTableBody">
                                            </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="card shadow-sm h-100">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">Upcoming Deadlines</h5>
                            </div>
                            <ul class="list-group list-group-flush" id="deadlineList">
                                </ul>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../utils/helpers.js"></script>
    <script src="../../assets/js/student.js"></script>
    <script>
        // Load Common Layouts
        document.addEventListener("DOMContentLoaded", async function() {
            await loadComponent("sidebar-container", "../../layouts/sidebar-student.html");
            await loadComponent("header-container", "../../layouts/header.html");
            
            // Re-initialize sidebar toggle listener after loading HTML
            const toggleBtn = document.getElementById("sidebarToggle");
            if(toggleBtn) {
                toggleBtn.addEventListener('click', function() {
                    document.getElementById("wrapper").classList.toggle("toggled");
                });
            }
        });
    </script>
</body>
</html>
