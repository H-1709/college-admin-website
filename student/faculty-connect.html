<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Faculty Connect | Student Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/student.css" />

    <style>
      :root {
        --accent-blue: #3b82f6;
        --glass-bg: rgba(255, 255, 255, 0.7);
        --card-border: rgba(226, 232, 240, 0.8);
      }

      body { background: #f8fafc; color: #1e293b; }

      /* Container for the chat list */
      .connect-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* Individual Chat Item (WhatsApp Style) */
      .faculty-card {
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 16px;
        display: flex;
        align-items: center;
        transition: all 0.2s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
      }

      .faculty-card:hover {
        background: white;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
      }

      /* Circular Avatar */
      .faculty-avatar {
        width: 60px;
        height: 60px;
        background: #e2e8f0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: var(--accent-blue);
        font-size: 1.2rem;
        flex-shrink: 0;
        margin-right: 16px;
      }

      /* Content Area */
      .faculty-details {
        flex-grow: 1;
        min-width: 0; /* Important for text truncation */
      }

      .faculty-name {
        font-weight: 700;
        font-size: 1.1rem;
        margin-bottom: 2px;
        color: #0f172a;
      }

      .faculty-meta {
        font-size: 0.85rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap; /* Allows wrapping on small screens */
        gap: 8px 16px;
      }

      .meta-item {
        display: flex;
        align-items: center;
        white-space: nowrap;
      }

      .meta-item i {
        margin-right: 6px;
        color: var(--accent-blue);
      }

      /* Office Hours Badge (Hidden on very small screens to stay clean) */
      .hours-tag {
        font-size: 0.75rem;
        padding: 4px 12px;
        border-radius: 50px;
        background: #e0f2fe;
        color: #0369a1;
        font-weight: 600;
      }

      /* Message Button */
      .btn-chat {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: var(--accent-blue);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        margin-left: 12px;
        transition: 0.2s;
        flex-shrink: 0;
      }

      .btn-chat:hover {
        background: #2563eb;
        transform: scale(1.1);
      }

      /* Mobile Specific Adjustments */
      @media (max-width: 576px) {
        .faculty-avatar { width: 50px; height: 50px; margin-right: 12px; }
        .faculty-name { font-size: 1rem; }
        .faculty-meta { flex-direction: column; gap: 2px; }
        .d-mobile-none { display: none; }
      }
    </style>
  </head>

  <body>
    <div id="sidebarContainer"></div>

    <div class="main-content">
      <div id="headerContainer"></div>

      <main class="container-fluid py-4">
        <div class="mb-4">
          <h2 class="fw-bold">Faculty Connect</h2>
          <p class="text-muted">Communicate with your professors for permissions or academic queries.</p>
        </div>

        <div class="connect-list">
          
          <div class="faculty-card">
            <div class="faculty-avatar">DR</div>
            <div class="faculty-details">
              <div class="d-flex justify-content-between align-items-start">
                <div class="faculty-name">Dr. David Robert</div>
                <span class="hours-tag d-mobile-none">2 PM - 4 PM</span>
              </div>
              <div class="faculty-meta">
                <div class="meta-item">
                  <i class="bi bi-briefcase"></i> Computer Engineering
                </div>
                <div class="meta-item">
                  <i class="bi bi-envelope"></i> david.r@college.edu
                </div>
              </div>
            </div>
            <button class="btn-chat" data-bs-toggle="modal" data-bs-target="#messageModal" title="Message">
              <i class="bi bi-chat-fill"></i>
            </button>
          </div>

          <div class="faculty-card">
            <div class="faculty-avatar" style="background: #fef3c7; color: #d97706;">SK</div>
            <div class="faculty-details">
              <div class="d-flex justify-content-between align-items-start">
                <div class="faculty-name">Prof. Sarah Khan</div>
                <span class="hours-tag d-mobile-none">10 AM - 12 PM</span>
              </div>
              <div class="faculty-meta">
                <div class="meta-item">
                  <i class="bi bi-briefcase"></i> Information Technology
                </div>
                <div class="meta-item">
                  <i class="bi bi-envelope"></i> s.khan@college.edu
                </div>
              </div>
            </div>
            <button class="btn-chat" data-bs-toggle="modal" data-bs-target="#messageModal" title="Message">
              <i class="bi bi-chat-fill"></i>
            </button>
          </div>

        </div>
      </main>

      <div class="modal fade" id="messageModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content border-0 shadow" style="border-radius: 24px;">
            <div class="modal-header border-0 pb-0 pt-4 px-4">
              <h5 class="fw-bold">New Message</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
              <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Subject</label>
                <input type="text" class="form-control border-0 bg-light rounded-3 py-2" placeholder="Permission for Lab Access">
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Message</label>
                <textarea class="form-control border-0 bg-light rounded-3" rows="4" placeholder="Type your message here..."></textarea>
              </div>
            </div>
            <div class="modal-footer border-0 p-4 pt-0">
              <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
              <button type="button" class="btn btn-primary rounded-pill px-4">Send Message</button>
            </div>
          </div>
        </div>
      </div>

      <div id="footerContainer"></div>
    </div>

    <script src="../assets/js/student.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      initLayout("../");
      
      // Auto-highlight sidebar link
      setTimeout(() => {
        const links = document.querySelectorAll(".sidebar a, #sidebarContainer a");
        links.forEach(l => { 
          if(l.innerText.trim() === "Faculty Connect") l.classList.add("active"); 
        });
      }, 200);
    </script>
  </body>
</html>
