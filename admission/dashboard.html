<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/admission.css">
</head>
<body>

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper">
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4">
                <h2 class="mb-4">Admission Insights</h2>

                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm border-start border-4 border-primary">
                            <div class="card-body">
                                <h6 class="text-muted small text-uppercase">Total Inquiries</h6>
                                <h3 class="fw-bold">1,250</h3>
                                <span class="text-success small"><i class="bi bi-arrow-up"></i> 12% vs last month</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm border-start border-4 border-warning">
                            <div class="card-body">
                                <h6 class="text-muted small text-uppercase">Applications</h6>
                                <h3 class="fw-bold">480</h3>
                                <span class="text-muted small">Conversion: 38%</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm border-start border-4 border-info">
                            <div class="card-body">
                                <h6 class="text-muted small text-uppercase">Interviews</h6>
                                <h3 class="fw-bold">120</h3>
                                <span class="text-info small">24 scheduled today</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm border-start border-4 border-success">
                            <div class="card-body">
                                <h6 class="text-muted small text-uppercase">Enrolled</h6>
                                <h3 class="fw-bold">85</h3>
                                <span class="text-success small">Target: 150</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-lg-6">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                                <h5 class="mb-0">Recent Activity</h5>
                                <button class="btn btn-sm btn-outline-primary">Refresh</button>
                            </div>
                            <div class="card-body p-0">
                                <div class="list-group list-group-flush" id="admissionActivity">
                                    </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-6">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-header bg-white py-3">
                                <h5 class="mb-0">Enrollment by Course</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <div class="d-flex justify-content-between mb-1">
                                        <span>Computer Science</span>
                                        <span>75%</span>
                                    </div>
                                    <div class="progress" style="height: 10px;">
                                        <div class="progress-bar bg-primary" style="width: 75%"></div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <div class="d-flex justify-content-between mb-1">
                                        <span>Business Admin</span>
                                        <span>50%</span>
                                    </div>
                                    <div class="progress" style="height: 10px;">
                                        <div class="progress-bar bg-success" style="width: 50%"></div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <div class="d-flex justify-content-between mb-1">
                                        <span>Engineering</span>
                                        <span>30%</span>
                                    </div>
                                    <div class="progress" style="height: 10px;">
                                        <div class="progress-bar bg-info" style="width: 30%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../assets/js/admission.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            await loadComponent("sidebar-container", "../layouts/sidebar-admission.html");
            await loadComponent("header-container", "../layouts/header.html");
            
            const toggleBtn = document.getElementById("sidebarToggle");
            if(toggleBtn) {
                toggleBtn.addEventListener('click', () => document.getElementById("wrapper").classList.toggle("toggled"));
            }
        });
    </script>
</body>
</html>
