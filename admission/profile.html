<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admission Officer Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/admission.css" />
</head>
<body>
  <div class="d-flex" id="wrapper">
    <div id="sidebar-container"></div>
    <div id="page-content-wrapper">
      <div id="header-container"></div>
      <div class="container-fluid px-4 py-4">
        <h3 class="mb-4">Admission Staff Profile</h3>
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
              <div class="card-body text-center">
                <img src="https://ui-avatars.com/api/?name=Anita+Sharma&background=0d6efd&color=fff" class="rounded-circle mb-3" width="96" alt="avatar"/>
                <h5 class="mb-1">Anita Sharma</h5>
                <p class="text-muted mb-3">Senior Admission Counselor</p>
                <button class="btn btn-outline-primary btn-sm">Edit Profile</button>
              </div>
            </div>
          </div>
          <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
              <div class="card-header bg-white"><h6 class="mb-0">Workload & Access</h6></div>
              <div class="card-body">
                <div class="row g-3">
                  <div class="col-md-6"><label class="form-label">Primary Region</label><input class="form-control" value="South Asia" /></div>
                  <div class="col-md-6"><label class="form-label">Daily Capacity</label><input class="form-control" value="35 inquiries/day" /></div>
                  <div class="col-md-6"><label class="form-label">Official Email</label><input class="form-control" value="anita.sharma@uniportal.edu" /></div>
                  <div class="col-md-6"><label class="form-label">Contact</label><input class="form-control" value="+1 555 203 1162" /></div>
                </div>
                <hr>
                <h6>Role Permissions</h6>
                <div class="d-flex gap-2 flex-wrap">
                  <span class="badge bg-primary">Application Review</span>
                  <span class="badge bg-info text-dark">Interview Assignment</span>
                  <span class="badge bg-success">Offer Approval</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../utils/helpers.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await loadComponent('sidebar-container', '../layouts/sidebar-admission.html');
      await loadComponent('header-container', '../layouts/header.html');
    });
  </script>
</body>
</html>
