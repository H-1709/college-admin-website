<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Office Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/admission.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>
        <div id="page-content-wrapper" class="bg-light d-flex flex-column min-vh-100">
            <div id="header-container"></div>
            
            <div class="container-fluid px-4 py-4 flex-grow-1">
                <h3 class="fw-bold mb-4">Admissions Staff Profile</h3>

                <div class="row g-4">
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm bg-white text-center p-4">
                            <div class="d-flex justify-content-center my-3">
                                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 100px; height: 100px; font-size: 2.2rem; font-weight: 700;">
                                    AH
                                </div>
                            </div>
                            <h4 class="fw-bold text-dark mb-1">Hir</h4>
                            <p class="text-muted small mb-3">Admission Office Executive</p>
                            <span class="badge bg-success bg-opacity-10 text-success border border-success-subtle mb-3">Active Account</span>
                            
                            <div class="border-top pt-3 text-start">
                                <p class="small text-muted mb-1"><i class="bi bi-envelope me-2"></i>hir@college.edu</p>
                                <p class="small text-muted mb-0"><i class="bi bi-telephone me-2"></i>+91 98765 43210</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm bg-white p-4">
                            <h5 class="fw-bold text-dark mb-4">Account Information</h5>
                            <form>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-semibold text-muted">First Name</label>
                                        <input type="text" class="form-control" value="Hir" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-semibold text-muted">Last Name</label>
                                        <input type="text" class="form-control" value="Rajyaguru" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-semibold text-muted">Email ID</label>
                                        <input type="email" class="form-control" value="hir@college.edu" readonly>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-semibold text-muted">Contact Number</label>
                                        <input type="tel" class="form-control" value="+91 98765 43210">
                                    </div>
                                </div>
                                <div class="mt-4 pt-3 border-top d-flex justify-content-end">
                                    <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../utils/helpers.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            await loadComponent("sidebar-container", "../layouts/sidebar-admission.html");
            await loadComponent("header-container", "../layouts/header.html");
            
            const toggleBtn = document.getElementById("sidebarToggle");
            if(toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    document.getElementById("wrapper").classList.toggle("toggled");
                });
            }
        });
    </script>
</body>
</html>
