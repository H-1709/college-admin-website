<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inquiry Manager - UniPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/admission.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>
        <div id="page-content-wrapper">
            <div id="header-container"></div>
            <div class="container-fluid px-4 py-4">
                <h3 class="mb-4">Student Inquiries</h3>
                <div class="card border-0 shadow-sm">
                    <div class="list-group list-group-flush">
                        <div class="list-group-item p-3 list-group-item-action">
                            <div class="d-flex w-100 justify-content-between">
                                <h6 class="mb-1 fw-bold">Sarah Miller <span class="badge bg-info ms-2">Scholarships</span></h6>
                                <small class="text-muted">12:45 PM</small>
                            </div>
                            <p class="mb-1 small">"I would like to know if there are full-ride scholarships available for International Students..."</p>
                            <div class="mt-2">
                                <button class="btn btn-sm btn-primary">Reply</button>
                                <button class="btn btn-sm btn-light border">Mark as Resolved</button>
                            </div>
                        </div>
                        <div class="list-group-item p-3 list-group-item-action bg-light">
                            <div class="d-flex w-100 justify-content-between">
                                <h6 class="mb-1 fw-bold">Tom Brown <span class="badge bg-warning text-dark ms-2">Hostel</span></h6>
                                <small class="text-muted">Yesterday</small>
                            </div>
                            <p class="mb-1 small">"Is the laundry fee included in the monthly hostel rent or charged separately?"</p>
                            <div class="mt-2">
                                <button class="btn btn-sm btn-primary">Reply</button>
                                <button class="btn btn-sm btn-light border">Mark as Resolved</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../utils/helpers.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            await loadComponent("sidebar-container", "../layouts/sidebar-admission.html");
            await loadComponent("header-container", "../layouts/header.html");
        });
    </script>
</body>
</html>
