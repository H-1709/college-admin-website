<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Pipeline - UniPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/base.css">
    <link rel="stylesheet" href="../../../assets/css/layout.css">
    <style>
        .pipeline-column {
            background-color: #ebedef;
            border-radius: 8px;
            min-height: 80vh;
            padding: 1rem;
        }
        .applicant-card {
            cursor: grab;
            border: none;
            border-left: 4px solid #0d6efd;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper">
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Application Pipeline</h2>
                    <div class="btn-group">
                        <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-filter"></i> Filter</button>
                        <button class="btn btn-primary btn-sm"><i class="bi bi-plus"></i> Add Applicant</button>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-3">
                        <div class="pipeline-column">
                            <h6 class="text-uppercase fw-bold mb-3">New <span class="badge bg-secondary ms-2">2</span></h6>
                            <div id="new-leads-container">
                                </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="pipeline-column">
                            <h6 class="text-uppercase fw-bold mb-3">In Review <span class="badge bg-primary ms-2">1</span></h6>
                            <div id="review-leads-container"></div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="pipeline-column">
                            <h6 class="text-uppercase fw-bold mb-3">Interview <span class="badge bg-warning text-dark ms-2">3</span></h6>
                            <div id="interview-leads-container"></div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="pipeline-column">
                            <h6 class="text-uppercase fw-bold mb-3">Decision <span class="badge bg-success ms-2">1</span></h6>
                            <div id="decision-leads-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../utils/helpers.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            // Adjust paths because this file is deep in the directory
            await loadComponent("sidebar-container", "../../layouts/sidebar-admission.html");
            await loadComponent("header-container", "../../layouts/header.html");
            
            // Mock data for applicants
            const applicants = [
                { id: 1, name: "Alice Thompson", course: "Computer Science", stage: "new" },
                { id: 2, name: "Kevin Hart", course: "Business", stage: "new" },
                { id: 3, name: "Sarah Jenkins", course: "Fine Arts", stage: "review" },
                { id: 4, name: "Robert Downey", course: "Engineering", stage: "interview" }
            ];

            applicants.forEach(app => {
                const card = `
                    <div class="card applicant-card shadow-sm">
                        <div class="card-body p-3">
                            <div class="d-flex justify-content-between">
                                <h6 class="mb-1">${app.name}</h6>
                                <i class="bi bi-three-dots-vertical text-muted"></i>
                            </div>
                            <p class="small text-muted mb-2">${app.course}</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="badge bg-light text-dark border">ID: #${app.id}</span>
                                <button class="btn btn-sm btn-link p-0 text-decoration-none">View</button>
                            </div>
                        </div>
                    </div>
                `;
                
                if(app.stage === 'new') document.getElementById('new-leads-container').innerHTML += card;
                else if(app.stage === 'review') document.getElementById('review-leads-container').innerHTML += card;
                else if(app.stage === 'interview') document.getElementById('interview-leads-container').innerHTML += card;
            });
        });
    </script>
</body>
</html>
