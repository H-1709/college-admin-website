<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unauthorized Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
</head>
<body class="bg-white">

    <div class="container d-flex flex-column align-items-center justify-content-center" style="height: 100vh;">
        <div class="text-danger mb-4">
            <i class="bi bi-shield-lock-fill" style="font-size: 6rem;"></i>
        </div>
        <h1 class="fw-bold">Access Denied</h1>
        <p class="text-muted text-center mb-4">
            You do not have the required permissions to view this module. <br>
            Please contact the System Admin if you believe this is an error.
        </p>
        <div class="d-flex gap-3">
            <button onclick="history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Go Back
            </button>
            <a href="login.html" class="btn btn-danger">
                Switch Account
            </a>
        </div>
    </div>

</body>
</html>
