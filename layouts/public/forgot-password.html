<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #5f6bdc, #7a49c9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, sans-serif;
    }
    .card { border-radius: 20px; }
  </style>
</head>
<body>
  <div class="card p-5 text-center" style="max-width:420px;width:100%;">
    <div class="mb-3" style="font-size:40px;"><i class="bi bi-key"></i></div>
    <h3 class="fw-bold">Forgot Password?</h3>
    <p class="text-muted">Enter your email and we'll send you instructions to reset your password</p>

    <div class="mb-3 text-start">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-control form-control-lg" placeholder="your.email@college.edu" />
    </div>

    <button class="btn btn-primary btn-lg w-100 mb-3">Send Reset Link</button>
    <a href="login.html">Back to Login</a>
  </div>
</body>
</html>
