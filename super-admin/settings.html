<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Global Settings | Admin Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <style>
    body { background: #f1f5f9; color: #334155; }
    .hero { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .settings-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 24px; margin-bottom: 24px; }
    .nav-pills .nav-link { color: #64748b; border-radius: 8px; font-weight: 500; }
    .nav-pills .nav-link.active { background: #0f172a; color: #fff; }
    .form-label { font-weight: 600; font-size: 0.9rem; }
    .section-divider { border-bottom: 1px solid #e2e8f0; margin-bottom: 20px; padding-bottom: 10px; }
  </style>
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="headerContainer"></div>
    <main class="container-fluid py-4">
      
      <div class="hero">
        <h2 class="fw-bold">Global Platform Settings</h2>
        <p class="text-muted mb-0">Configure core institutional parameters and system-wide security policies.</p>
      </div>

      <div class="row">
        <div class="col-lg-3">
          <div class="nav flex-column nav-pills gap-2" id="v-pills-tab" role="tablist">
            <button class="nav-link active text-start" data-bs-toggle="pill">General Preferences</button>
            <button class="nav-link text-start" data-bs-toggle="pill">Security & Access</button>
            <button class="nav-link text-start" data-bs-toggle="pill">API Integrations</button>
            <button class="nav-link text-start" data-bs-toggle="pill">Notification Rules</button>
          </div>
        </div>

        <div class="col-lg-9">
          <div class="settings-card">
            <h5 class="fw-bold section-divider">General Institutional Details</h5>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Institution Name</label>
                <input type="text" class="form-control" placeholder="University Name">
              </div>
              <div class="col-md-6">
                <label class="form-label">Academic Year</label>
                <select class="form-select">
                  <option>2026-2027</option>
                  <option>2025-2026</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">System Timezone</label>
                <input type="text" class="form-control" value="(UTC+05:30) Chennai, Kolkata, Mumbai">
              </div>
            </div>
            
            <div class="mt-4 pt-4 border-top">
              <button class="btn btn-dark px-4">Save Changes</button>
              <button class="btn btn-outline-secondary px-4">Reset</button>
            </div>
          </div>
        </div>
      </div>

    </main>
    <div id="footerContainer"></div>
  </div>
  <script src="../assets/js/admin.js"></script>
  <script>if (typeof initAdminLayout === "function") initAdminLayout("../");</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
