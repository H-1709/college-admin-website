<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Departments - UniPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/base.css">
    <link rel="stylesheet" href="../../../assets/css/layout.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>
        <div id="page-content-wrapper">
            <div id="header-container"></div>
            <div class="container-fluid px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>Academic Departments</h3>
                    <button class="btn btn-primary"><i class="bi bi-plus-circle"></i> Add Department</button>
                </div>

                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body">
                                <div class="d-flex align-items-center mb-3">
                                    <div class="bg-primary text-white rounded p-3 me-3">
                                        <i class="bi bi-laptop fs-3"></i>
                                    </div>
                                    <h5 class="mb-0">Computer Science</h5>
                                </div>
                                <p class="text-muted small">Head: Dr. Alan Turing<br>Staff: 24 | Students: 450</p>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-sm btn-outline-secondary w-100">Edit</button>
                                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body">
                                <div class="d-flex align-items-center mb-3">
                                    <div class="bg-success text-white rounded p-3 me-3">
                                        <i class="bi bi-briefcase fs-3"></i>
                                    </div>
                                    <h5 class="mb-0">Business Admin</h5>
                                </div>
                                <p class="text-muted small">Head: Dr. Adam Smith<br>Staff: 18 | Students: 320</p>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-sm btn-outline-secondary w-100">Edit</button>
                                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../utils/helpers.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            await loadComponent("sidebar-container", "../../layouts/sidebar-admin.html");
            await loadComponent("header-container", "../../layouts/header.html");
        });
    </script>
</body>
</html>
