<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Courses | Admin Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../../assets/css/base.css" />
  <link rel="stylesheet" href="../../assets/css/layout.css" />
  <link rel="stylesheet" href="../../assets/css/admin.css" />
  <style>
    body { background:#f8fafc; }
    .hero { background:linear-gradient(135deg,#1e293b,#334155); color:#fff; border-radius:20px; padding:28px; }
    .glass-card { background:rgba(255,255,255,.8); border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 10px 20px rgba(0,0,0,.04); }
  </style>
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="headerContainer"></div>
    <main class="container-fluid py-4">
      <div class="hero mb-4"><h2 class="mb-1 fw-bold">Course Catalog</h2><p class="mb-0 opacity-75">Modern admin interface using Bootstrap only (no backend integration).</p></div>
      <div class="row g-4">
        <div class="col-lg-8">
          <div class="glass-card p-4">
            <h5 class="fw-bold mb-3">Overview</h5>
            <div class="row g-3">
              <div class="col-md-4"><div class="p-3 bg-light rounded-3"><small class="text-muted">Total</small><div class="fs-4 fw-bold">1,284</div></div></div>
              <div class="col-md-4"><div class="p-3 bg-light rounded-3"><small class="text-muted">Active</small><div class="fs-4 fw-bold">1,102</div></div></div>
              <div class="col-md-4"><div class="p-3 bg-light rounded-3"><small class="text-muted">Pending</small><div class="fs-4 fw-bold">42</div></div></div>
            </div>
            <div class="table-responsive mt-4"><table class="table table-hover align-middle mb-0"><thead><tr><th>Record</th><th>Owner</th><th>Status</th><th>Updated</th></tr></thead><tbody><tr><td>Sample Item A</td><td>Admin Team</td><td><span class="badge text-bg-success">Healthy</span></td><td>2h ago</td></tr><tr><td>Sample Item B</td><td>Operations</td><td><span class="badge text-bg-warning">Review</span></td><td>Today</td></tr></tbody></table></div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="glass-card p-4 mb-4"><h6 class="fw-bold">Quick Actions</h6><button class="btn btn-primary w-100 mb-2">Create New</button><button class="btn btn-outline-secondary w-100 mb-2">Export Report</button><button class="btn btn-outline-danger w-100">Archive Selected</button></div>
          <div class="glass-card p-4"><h6 class="fw-bold">Notes</h6><p class="small text-muted mb-0">This page is static UI only for frontend preview.</p></div>
        </div>
      </div>
    </main>
    <div id="footerContainer"></div>
  </div>
  <script src="../../assets/js/admin.js"></script>
  <script>
    if (typeof initAdminLayout === 'function') initAdminLayout('../../');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
