<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Semesters - UniPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/base.css">
    <link rel="stylesheet" href="../../../assets/css/layout.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>
        <div id="page-content-wrapper">
            <div id="header-container"></div>
            <div class="container-fluid px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>Academic Calendar</h3>
                    <button class="btn btn-primary"><i class="bi bi-calendar-plus"></i> Create New Session</button>
                </div>

                <div class="card border-primary border-2 shadow-sm mb-4">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-primary fw-bold mb-1">Current Session</h6>
                            <h2 class="mb-0">Fall 2025</h2>
                            <span class="text-muted small">Aug 1st, 2025 - Dec 15th, 2025</span>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-success fs-6 mb-2">Active</span>
                            <div>
                                <button class="btn btn-outline-danger btn-sm">End Session</button>
                            </div>
                        </div>
                    </div>
                </div>

                <h5 class="mb-3">Session History</h5>
                <div class="list-group shadow-sm">
                    <div class="list-group-item d-flex justify-content-between align-items-center list-group-item-action">
                        <div>
                            <h5 class="mb-1">Spring 2026</h5>
                            <small class="text-muted"><i class="bi bi-calendar"></i> Jan 10th, 2026 - May 20th, 2026</small>
                        </div>
                        <span class="badge bg-warning text-dark rounded-pill">Upcoming</span>
                    </div>
                    
                    <div class="list-group-item d-flex justify-content-between align-items-center list-group-item-action bg-light">
                        <div>
                            <h5 class="mb-1 text-muted">Summer 2025</h5>
                            <small class="text-muted"><i class="bi bi-calendar"></i> June 1st, 2025 - July 30th, 2025</small>
                        </div>
                        <span class="badge bg-secondary rounded-pill">Completed</span>
                    </div>

                    <div class="list-group-item d-flex justify-content-between align-items-center list-group-item-action bg-light">
                        <div>
                            <h5 class="mb-1 text-muted">Spring 2025</h5>
                            <small class="text-muted"><i class="bi bi-calendar"></i> Jan 10th, 2025 - May 20th, 2025</small>
                        </div>
                        <span class="badge bg-secondary rounded-pill">Completed</span>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../utils/helpers.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            await loadComponent("sidebar-container", "../../layouts/sidebar-admin.html");
            await loadComponent("header-container", "../../layouts/header.html");
        });
        
    </script>
</body>
</html>
